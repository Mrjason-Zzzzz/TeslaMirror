name: 完整反编译单APK
on: workflow_dispatch
permissions:
  contents: write
jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 配置Java17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: 安装Apktool 2.10.0
        run: |
          wget https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool
          wget https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar
          mv apktool_2.10.0.jar apktool.jar
          chmod +x apktool apktool.jar
          sudo mv apktool apktool.jar /usr/local/bin/
      - name: 完整反编译（生成smali代码）
        run: apktool d app.apk -o decompiled -f
      - name: 清理原包残留签名目录
        run: rm -rf decompiled/META-INF
      - name: 提交反编译源码到仓库
        run: |
          git config --global user.name "AutoBot"
          git config --global user.email "bot@github.com"
          git add decompiled/
          git commit -m "完整反编译合并后单APK，清理旧签名" || true
          git push
