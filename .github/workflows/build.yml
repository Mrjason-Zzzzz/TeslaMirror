name: 打包签名生成APK

on:
  push:
    paths:
      - 'decompiled/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 安装Java环境
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 下载Apktool
        run: |
          wget https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool
          wget https://bitbucket.org/iBotPeaches/apktool/downloads/apktool_2.9.3.jar
          mv apktool_2.9.3.jar apktool.jar
          chmod +x apktool apktool.jar
          sudo mv apktool apktool.jar /usr/local/bin/

      - name: 回编译APK
        run: apktool b decompiled -o app-modified.apk

      - name: 下载签名工具
        run: wget https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar

      - name: 签名APK
        run: java -jar uber-apk-signer-1.3.0.jar --apks app-modified.apk

      - name: 上传成品APK
        uses: actions/upload-artifact@v4
        with:
          name: 优化版APK安装包
          path: app-modified-aligned-debugSigned.apk
