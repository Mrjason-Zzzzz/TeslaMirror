name: 打包签名生成APK

on:
  push:
    paths:
      - 'decompiled/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 安装Java环境
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 下载Apktool
        run: |
          wget https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool
          wget https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar
          mv apktool_2.10.0.jar apktool.jar
          chmod +x apktool apktool.jar
          sudo mv apktool apktool.jar /usr/local/bin/

      - name: 清理旧签名元数据（解决证书污染）
        run: |
          rm -rf decompiled/META-INF
          echo "已清理原APK残留的签名文件，避免校验冲突"

      - name: 回编译APK
        run: |
          apktool b decompiled -o app-unsigned.apk
          echo "=== 回编译完成 ==="
          ls -lh app-unsigned.apk

      - name: 下载签名工具
        run: wget https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar

      - name: 签名APK（默认v1+v2+v3全签名 + 自动对齐）
        run: |
          java -jar uber-apk-signer-1.3.0.jar --apks app-unsigned.apk --out ./output
          echo "=== 签名完成 ==="
          ls -lh ./output/

      - name: 校验APK完整性
        run: |
          if unzip -t ./output/*.apk | grep -q "No errors"; then
            echo "✅ APK 结构校验通过"
          else
            echo "❌ APK 结构损坏"
            exit 1
          fi

      - name: 上传成品APK
        uses: actions/upload-artifact@v4
        with:
          name: 优化版APK安装包
          path: ./output/*.apk
