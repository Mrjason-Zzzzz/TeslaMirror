name: Android CI/CD Automation Build Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source Code
      uses: actions/checkout@v4.2.2

    - name: Set up JDK 17 Runtime Environment
      uses: actions/setup-java@v4.5.0
      with:
        java-version: '17'
        distribution: 'temurin'

    # ========================== 🔥 核心修复：上帝特权模式全量注入并强行覆写冲突脚本 ==========================
    - name: Inject & Standardize Clean Gradle Architecture
      run: |
        echo "[SYSTEM] Initializing clean wrapper engine..."
        gradle wrapper --gradle-version 7.5 --distribution-type bin
        
        # 1. 强行修正依赖声明，让 settings.gradle 成为最高且唯一的仓库管理中心
        echo "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }" > settings.gradle
        echo "dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS); repositories { google(); mavenCentral() } }" >> settings.gradle
        echo "rootProject.name = 'TeslaCastCore'" >> settings.gradle
        echo "include ':app'" >> settings.gradle
        
        # 2. 彻底清洗根 build.gradle，剥离冲突的 repositories 声明，全面升级 Android 编译内核
        echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:7.4.2' } }" > build.gradle
        echo "task clean(type: Delete) { delete rootProject.buildDir }" >> build.gradle
        
        # 3. 拦截并硬挂钩 Android SDK 物理路径
        echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
        
        echo "[SUCCESS] Gradle Strategy Conflict Resolved."
    # ===================================================================================================

    - name: Grant Execute Permission for Gradle Wrapper
      run: chmod +x gradlew

    - name: Trigger Universal APK Compilation via Local Wrapper
      run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

    - name: Upload Compiled Production APK Package Artifacts
      uses: actions/upload-artifact@v4.6.0
      with:
        name: TeslaCast-Core-Engine
        path: app/build/outputs/apk/debug/*.apk
