name: Android CI/CD Automation Build Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17 Runtime Environment
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # ========================== 🔥 核心修复点：现场生成 gradlew ==========================
    - name: Environment Sanity Check & Generate Gradle Wrapper
      run: |
        if [ ! -f "gradlew" ]; then
          echo "[WARNING] gradlew not found in repository root. Injecting wrapper engine..."
          gradle wrapper --gradle-version 7.5 --distribution-type bin
        fi
    # ===================================================================================

    - name: Grant Execute Permission for Gradle Wrapper
      run: chmod +x gradlew

    - name: Trigger Production APK Compilation (Assemble Release)
      run: ./gradlew assembleRelease

    - name: Upload Compiled Production APK Package Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TeslaCast-Core-Engine
        path: app/build/outputs/apk/release/app-release-unsigned.apk
