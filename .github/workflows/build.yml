name: Android CI/CD Automation Build Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source Code
      uses: actions/checkout@v4.2.2

    - name: Set up JDK 11 Runtime Environment
      uses: actions/setup-java@v4.5.0
      with:
        java-version: '11' # 锁定最契合你原始项目的 Java 11 引擎
        distribution: 'temurin'

    # ========================== 🔥 核心修复：强制清洗打架的配置，不碰核心逻辑 ==========================
    - name: Restructure Build Engineering Without Touching Code
      run: |
        echo "[SYSTEM] Cleaning up strict repository conflicts..."
        
        # 1. 强制生成标准 7.5 版本的打包封装器，直接废掉虚拟机系统的 9.6 版本
        gradle wrapper --gradle-version 7.5 --distribution-type bin
        
        # 2. 强行将 settings.gradle 降维清洗，允许 build.gradle 的传统写法，不让它们打架
        cat << 'EOF' > settings.gradle
        dependencyResolutionManagement {
            // 彻底关闭严格检查模式！允许老项目的仓库声明，绝不报错熔断
            repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = 'TeslaMirror'
        include ':app'
        EOF
        
        # 3. 拦截并绑定物理 SDK 通路
        echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
        
        echo "[SUCCESS] Engineering environment successfully downgraded and balanced."
    # ===================================================================================================

    - name: Grant Execute Permission for Gradle Wrapper
      run: chmod +x gradlew

    - name: Execute Unaltered Core Compilation
      # 强行调用我们自己降级后的 ./gradlew，使用 --no-daemon 彻底隔离高版本干扰
      run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

    - name: Upload Final Unaltered Functional APK
      uses: actions/upload-artifact@v4.6.0
      with:
        name: TeslaCast-Primary-Unaltered-Engine
        path: app/build/outputs/apk/debug/*.apk
