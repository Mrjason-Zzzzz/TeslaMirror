name: Android CI/CD Automation Build Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source Code
      uses: actions/checkout@v4.2.2

    - name: Set up JDK 17 Runtime Environment
      uses: actions/setup-java@v4.5.0
      with:
        java-version: '17'
        distribution: 'temurin'

    # ========================== 🔥 核心修复：上帝模式硬编码生成全套 Gradle 依赖骨架 ==========================
    - name: Inject Complete Gradle Structure & Environment
      run: |
        echo "[SYSTEM] Initializing clean wrapper engine..."
        gradle wrapper --gradle-version 7.5 --distribution-type bin
        
        # 强制修正 gradle-wrapper.properties
        mkdir -p gradle/wrapper
        echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
        echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        echo "distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        
        # 强行对齐 local.properties 拦截 Android SDK 路径
        echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
        
        echo "[SUCCESS] Core Build Engine Completely Synced."
    # ===================================================================================================

    - name: Grant Execute Permission for Gradle Wrapper
      run: chmod +x gradlew

    # 💡 核心修复 2：不再依赖外部黑盒，直接用 gradle wrapper 精准触发本地构建
    - name: Trigger Universal APK Compilation via Local Wrapper
      run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

    - name: Upload Compiled Production APK Package Artifacts
      uses: actions/upload-artifact@v4.6.0
      with:
        name: TeslaCast-Core-Engine
        path: app/build/outputs/apk/debug/*.apk
