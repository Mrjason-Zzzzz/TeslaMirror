            visibility: hidden;

    .vjs-unmute-overlay{position:absolute;background-color:rgba(43,51,63,.10);left:0;right:0;top:0px;bottom:0;}

    <div>
        <audio id="audio" autoplay muted></audio>
    </div>
    <div class="vjs-unmute-overlay" style="height:100%">
        <img id="stream" src="SCREEN_STREAM_ADDRESS" onerror="streamFallback()" onclick="mjpegStartStop()"/>
    </div>

<script>
if ("undefined" != typeof history.pushState) { var o = { Title: "TeslaDisplay", Url: "/" }; history.pushState(o, o.Title, o.Url) }

function streamFallback() { //mjpeg -> jpeg fallback
    var baseurl = "SCREEN_STREAM_ADDRESS".split(".mjpeg")[0];

    function streamStillUpdate() { // refresh the image
        stream.src = baseurl + ".jpeg?t=" + Math.random();
    }

    setInterval(streamStillUpdate, 500);
}
function mjpegStartStop() {
    var xmlHttp = new XMLHttpRequest();
    xmlHttp.open("GET", window.location.origin + "/mjpeg-start-stop", true);
    xmlHttp.send(null);
}

setTimeout( function () { // check if the mjpeg image could be loaded, otherwise use the jpeg fallback
    if (!document.getElementById("stream").complete) streamFallback();
}, 2000);

function sleep(time){
    return new Promise((resolve) => setTimeout(resolve, time));
}
window.ws_protocol = "WEBSOCKET_PROTOCOL";
window.ws_port = "WEBSOCKET_PORT";
</script>
