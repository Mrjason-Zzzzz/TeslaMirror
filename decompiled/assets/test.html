    <style>
        body,
        html {

    .vjs-unmute-overlay{position:absolute;background-color:rgba(43,51,63,.10);left:0;right:0;top:30px;bottom:0;}
    .vjs-unmute{position:absolute;opacity:.99;z-index:20000;left:20px;top:20px;border-radius:5px;line-height:30px;text-align:center;cursor:pointer;font-size:17px;color:white;font-weight:500;background-color:rgba(0,0,0,.5);padding:10px 13px}
    .vjs-mute{position:absolute;opacity:.99;z-index:20000;left:20px;top:20px;border-radius:5px;line-height:30px;text-align:center;cursor:pointer;font-size:17px;color:white;font-weight:500;background-color:rgba(0,0,0,.5);padding:10px 13px}

 <script src="
https://cdn.jsdelivr.net/npm/howler@2.2.3/dist/howler.min.js
"></script>
<script>
    if ("undefined" != typeof history.pushState) { var o = { Title: "Tesla Display", Url: "/" }; history.pushState(o, o.Title, o.Url) }
    
    function sleep(time){
        return new Promise((resolve) => setTimeout(resolve, time));
    }
    window.ws_protocol = "WEBSOCKET_PROTOCOL";
    window.audio_file = "AUDIO_STREAM_ADDRESS";
    console.log("innerWidth = " + window.innerWidth)
    console.log("innerHeight = " + window.innerHeight)
    socket = new WebSocket('ws://'+window.location.hostname+':'+50102)
</script>
<script>

function playAtTimeMessage (time = 0) {
  const obj = {
    action: 'playAtTime',
    value: time
  }
  const result = JSON.stringify(obj)
  return result
}
function play(){
    socket.send(playAtTimeMessage(0))
    var sound = new Howl({
    src: ['AUDIO_STREAM_ADDRESS'],
    html5: true
    });
    sound.play();
}


</script>
