<!DOCType html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TeslaDisplay</title>
    <style>
    th{text-align:left}
        body,
        html {
            width: 100%;
            height: 100%;
            margin: 0;
            border: 0;
            overflow: hidden;
            display: block;
            font-family: sans-serif
        }

        body {
            background: BACKGROUND_COLOR
        }
        .full {
            width: 100%;
            height: 100%;
        }
        .video-box {
            position: relative;
            top: 50%;
            transform: translateY(-50%);
        }
        .video-innerbox {
            height: 100%;
        }
        .vjs-tech {
            pointer-events: none;
        }
        #deviceGestures {
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0);
            z-index: 10000;
        }
    </style>
    <link href="./static/video-js.min.css" rel="stylesheet">
    <link href="./static/videojs-unmute.min.css" rel="stylesheet">

</head>
<body>
<div class="full">
    <div><span id="server_status">Waiting for server ready!</span></div>
    <table id="head_table" class="online-user-list" style="width:100%">
    </table>
    <div class="video-innerbox"  id="gestureArea">
        <div class="video-box" style="display:none; justify-content:center;height:100%">
            <!-- videojs-unmute require id=vid1 -->
            <video  id="vid1"
                    class="video-js remote-video"
                    preload="auto"
                    autoplay="play"
                    muted="muted"
                    data-setup='{}'>
                <p class="vjs-no-js">
                    To view this video please enable JavaScript, and consider upgrading to a
                    web browser that
                    <a href="https://videojs.com/html5-video-support/" target="_blank">
                        supports HTML5 video
                    </a>
                </p>
            </video>
        </div>
    </div>
</div>
</body>
